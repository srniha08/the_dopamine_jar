<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dopamine Jar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="todo-section">
            <h1 class="witty-title">The Illusion of Progress</h1>
            <p class="subtitle">Convert your chores into colorful marble serotonin.</p>
            
            <div class="input-container">
                <input type="text" id="task-input" placeholder="What obligation are we avoiding today?">
                <button id="add-btn">Manifest It</button>
            </div>

            <ul id="task-list">
                </ul>
        </div>

        <div class="jar-section">
            <div class="jar">
                <div class="jar-lid"></div>
                <div class="jar-body" id="jar-body">
                    </div>
            </div>
            <p class="jar-counter"><span id="count-num">0</span> / 15 Delusions Shattered</p>
            <button id="restart-btn">Ghost My Responsibilities</button> 
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
